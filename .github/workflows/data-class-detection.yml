# IGE-123022 - Rita Peixoto
# Quality Gate: Deteção do code smell "Data Class" (Fowler)
# Critério: WOC < 0.33 e NOPA >= 3 e NOAM >= 3 (Object-Oriented Metrics in Practice, Lanza & Marinescu)
# Ferramenta: Qodana for JVM
name: Data Class Detection - Quality Gate
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  data-class-detection:
    name: Detect Data Class Code Smell
    runs-on: ubuntu-latest
    steps:
      - name: Verify Java version
        run: |
          java -version
          mvn -version
          echo "JAVA_HOME: $JAVA_HOME"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Create Qodana configuration for Data Class detection
        run: |
          cat > qodana-dataclass.yaml << 'EOF'
          version: "1.0"
          profile:
            name: qodana.starter
          include:
            - name: ClassWithTooManyFields
            - name: OverlyWeakMethodSecurity
            - name: PublicFieldAccessedInSynchronizedContext
          exclude:
            - name: BusyWait
            - name: SuspiciousIndentationAfterControlStatementWithoutBraces
            - name: NullableProblems
            - name: SlowAbstractSetRemoveAll
            - name: UnusedAssignment
          linter: jetbrains/qodana-jvm:2024.3
          projectJDK: "21"
          failureConditions:
            severityThresholds:
              any: 5
          EOF

      - name: Run Qodana Data Class Analysis
        uses: JetBrains/qodana-action@v2024.3
        with:
          args: --config,qodana-dataclass.yaml
          results-dir: ${{ runner.temp }}/qodana-results
          upload-result: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_740574030 }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload Qodana results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: data-class-report
          path: ${{ runner.temp }}/qodana-results
          retention-days: 30

      - name: Summary Report
        if: always()
        run: |
          echo "## 🔍 Data Class Detection Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Critérios utilizados (Object-Oriented Metrics in Practice)" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Limiar | Descrição |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| WOC  | < 0.33 | Weight Of a Class (pouco comportamento real) |" >> $GITHUB_STEP_SUMMARY
          echo "| NOPA | >= 3   | Number Of Public Attributes |" >> $GITHUB_STEP_SUMMARY
          echo "| NOAM | >= 3   | Number Of Accessor Methods |" >> $GITHUB_STEP_SUMMARY
          echo "| WMC  | < 15   | Weighted Methods Per Class |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Inspeções Qodana ativas" >> $GITHUB_STEP_SUMMARY
          echo "- **ClassWithTooManyFields**: Classes com demasiados campos públicos" >> $GITHUB_STEP_SUMMARY
          echo "- **OverlyWeakMethodSecurity**: Métodos públicos desnecessários" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Refatorações sugeridas (Fowler)" >> $GITHUB_STEP_SUMMARY
          echo "- **Move Method**: Mover comportamento para dentro da Data Class" >> $GITHUB_STEP_SUMMARY
          echo "- **Encapsulate Field**: Tornar campos privados com getters/setters" >> $GITHUB_STEP_SUMMARY
          echo "- **Encapsulate Collection**: Encapsular coleções expostas publicamente" >> $GITHUB_STEP_SUMMARY
          echo "- **Remove Setting Method**: Remover setters desnecessários" >> $GITHUB_STEP_SUMMARY
          echo "- **Hide Method**: Ocultar getters/setters não usados externamente" >> $GITHUB_STEP_SUMMARY