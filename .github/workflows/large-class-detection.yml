# IGE-122989 - Carolina Lisboa
# Quality Gate: Deteção do code smell "Large Class" / "God Class" (Fowler)
# Critério: WMC >= 47, TCC < 1/3, ATFD > 5
# (Object-Oriented Metrics in Practice, Lanza & Marinescu, p. 80-83)
# Ferramenta: Qodana for JVM

name: Large Class Detection - Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # permite execução manual

jobs:
  large-class-detection:
    name: Detect Large Class Code Smell
    runs-on: ubuntu-latest

    steps:
      - name: Verify Java version
        run: |
          java -version
          mvn -version
          echo "JAVA_HOME: $JAVA_HOME"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Create Qodana configuration for Large Class detection
        run: |
          cat > qodana-largeclass.yaml << 'EOF'
          version: "1.0"
          profile:
            name: qodana.starter
          include:
            - name: ClassWithTooManyMethods      # WMC elevado — Large Class
            - name: OverlyComplexClass           # Complexidade funcional alta
            - name: ClassWithTooManyFields       # Número excessivo de atributos
          exclude:
            - name: BusyWait
            - name: SuspiciousIndentationAfterControlStatementWithoutBraces
            - name: NullableProblems
            - name: UnusedAssignment
          linter: jetbrains/qodana-jvm:2024.3
          projectJDK: "21"
          failureConditions:
            severityThresholds:
              any: 5
          EOF

      - name: Run Qodana Large Class Analysis
        uses: JetBrains/qodana-action@v2024.3
        with:
          args: --config,qodana-largeclass.yaml
          results-dir: ${{ runner.temp }}/qodana-results
          upload-result: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_740574030 }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload Qodana results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: large-class-report
          path: ${{ runner.temp }}/qodana-results
          retention-days: 30

      - name: Summary Report
        if: always()
        run: |
          echo "## 🔍 Large Class Detection Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Critérios utilizados (Object-Oriented Metrics in Practice)" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Limiar | Descrição |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| WMC | ≥ 47 | Weighted Method Count (Very High) |" >> $GITHUB_STEP_SUMMARY
          echo "| TCC | < 1/3 | Tight Class Cohesion baixa |" >> $GITHUB_STEP_SUMMARY
          echo "| ATFD | > 5 | Access To Foreign Data (FEW) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Inspeções Qodana ativas" >> $GITHUB_STEP_SUMMARY
          echo "- **ClassWithTooManyMethods**: Classes com WMC excessivo" >> $GITHUB_STEP_SUMMARY
          echo "- **OverlyComplexClass**: Classes com complexidade muito alta" >> $GITHUB_STEP_SUMMARY
          echo "- **ClassWithTooManyFields**: Classes com demasiados atributos" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Equivalência com Fowler" >> $GITHUB_STEP_SUMMARY
          echo "O livro 'OO Metrics in Practice' (Lanza & Marinescu) formaliza o" >> $GITHUB_STEP_SUMMARY
          echo "**Large Class** de Fowler como **God Class**, detetada quando:" >> $GITHUB_STEP_SUMMARY
          echo "- ATFD > 5 (acede a dados de outras classes)" >> $GITHUB_STEP_SUMMARY
          echo "- WMC >= 47 (complexidade funcional muito alta)" >> $GITHUB_STEP_SUMMARY
          echo "- TCC < 1/3 (coesão baixa)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Refatorações sugeridas (Fowler)" >> $GITHUB_STEP_SUMMARY
          echo "- **Extract Class**: Dividir a classe em classes mais pequenas" >> $GITHUB_STEP_SUMMARY
          echo "- **Extract Subclass**: Mover comportamento para subclasses" >> $GITHUB_STEP_SUMMARY
          echo "- **Extract Interface**: Separar a interface da implementação" >> $GITHUB_STEP_SUMMARY
          echo "- **Move Method**: Mover métodos para classes mais adequadas" >> $GITHUB_STEP_SUMMARY
