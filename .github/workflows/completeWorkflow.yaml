name: Complete CI/CD Pipeline
permissions:
  contents: write
on:
  push:
    branches:
      - main
jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verificar dependências
        run: mvn dependency:resolve

      - name: Compilar o projeto
        run: mvn clean compile

      - name: Executar testes unitários
        run: mvn test

      - name: Criar JAR
        run: mvn package -DskipTests

      - name: Validar qualidade no SonarQube Cloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagem Docker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/battleship-game:latest .

      - name: Publicar imagem no Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/battleship-game:latest

      - name: Atualizar documentação GitHub Pages
        run: mvn site -DskipTests
